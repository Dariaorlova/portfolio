"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"0d230446-660a-481c-9fb6-db57c7c58799\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7dae894d-5270-41ec-917b-5aa19a0c93b2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"77e2a961-dbf9-4fde-a196-1d3296388f9e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7dae894d-5270-41ec-917b-5aa19a0c93b2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spline Sans Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"77e2a961-dbf9-4fde-a196-1d3296388f9e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; background: #FFFFFF; }\n  ::selection { background: rgba(86,98,74,0.18); }\n  .zoomable { cursor: zoom-in; transition: opacity .15s ease; }\n  .zoomable:hover { opacity: .82; }\n  #img-lightbox { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; padding: 40px; background: rgba(255,255,255,0.94); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); cursor: zoom-out; }\n  #img-lightbox.open { display: flex; }\n  #img-lightbox img { max-width: 100%; max-height: 100%; box-shadow: 0 24px 60px rgba(17,17,17,0.18); }\n<\u002Fstyle>\n<script>\n(function () {\n  function ensureBox() {\n    var b = document.getElementById('img-lightbox');\n    if (!b) {\n      b = document.createElement('div');\n      b.id = 'img-lightbox';\n      b.innerHTML = '<img alt=\"\">';\n      document.body.appendChild(b);\n      b.addEventListener('click', close);\n    }\n    return b;\n  }\n  function close() {\n    var b = document.getElementById('img-lightbox');\n    if (b) b.classList.remove('open');\n  }\n  document.addEventListener('click', function (e) {\n    var img = e.target.closest && e.target.closest('img.zoomable');\n    if (!img) return;\n    var b = ensureBox();\n    b.querySelector('img').src = img.currentSrc || img.src;\n    b.classList.add('open');\n  });\n  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"background:#FFFFFF; color:#111111; font-family:system-ui, -apple-system, 'Segoe UI', sans-serif; -webkit-font-smoothing:antialiased;\">\n\n  <!-- NAV -->\n  <div style=\"position:sticky; top:0; z-index:20; background:rgba(255,255,255,0.85); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-bottom:1px solid rgba(17,17,17,0.08);\">\n    <div style=\"max-width:900px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between;\">\n      <a href=\"Dasha Orlova.html\" style=\"font-size:13px; color:#888888; text-decoration:none;\" style-hover=\"color:#111111;\">← Dasha Orlova<\u002Fa>\n      <div style=\"display:flex; align-items:center; gap:22px; font-size:13px; color:#888888;\">\n        <a href=\"Dasha Orlova.html#projects\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#111111;\">Projects<\u002Fa>\n        <a href=\"Dasha Orlova.html#contact\" style=\"color:inherit; text-decoration:none;\" style-hover=\"color:#111111;\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <div style=\"max-width:900px; margin:0 auto; padding:96px 24px 0;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:22px;\">Management<\u002Fdiv>\n    <h1 style=\"font-size:34px; line-height:1.15; font-weight:400; letter-spacing:-0.01em; margin:0 0 18px;\">Building a UX Research Function from Scratch<\u002Fh1>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; max-width:75ch; margin:0;\">Built a UXR function from scratch, establishing full research infrastructure: a research lab, Jira processes, standards, and templates. Implemented user research into the product development cycle. Contributed to 10× MAU growth and +45% watch time.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- METRICS -->\n  <div style=\"max-width:900px; margin:0 auto; padding:60px 24px 0px;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:24px;\">Impact<\u002Fdiv>\n    <div style=\"display:flex; gap:40px; flex-wrap:wrap; padding:0px; border-top-style:solid; border-top-color:rgba(17,17,17,0.12); border-width:0px;\">\n      <div>\n        <div style=\"font-size:26px; font-weight:400; letter-spacing:-0.01em;\">10×<\u002Fdiv>\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#888888; margin-top:4px;\">MAU growth<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:26px; font-weight:400; letter-spacing:-0.01em;\">+45%<\u002Fdiv>\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#888888; margin-top:4px;\">Watch time<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:26px; font-weight:400; letter-spacing:-0.01em;\">14<\u002Fdiv>\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#888888; margin-top:4px;\">People hired<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:26px; font-weight:400; letter-spacing:-0.01em;\">200+<\u002Fdiv>\n        <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#888888; margin-top:4px;\">Studies / yr 1<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTEXT -->\n  <div style=\"max-width:900px; margin:0 auto; padding:60px 24px 0px; height:357px;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:24px;\">Context<\u002Fdiv>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; margin:0 0 20px; max-width:75ch;\">RUTUBE is one of Russia's major video platforms. Created in 2006, it was fully relaunched in summer 2021 with a new company structure and an ambitious goal to become one of Russia's leading video platforms for both viewers and creators.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; margin:0 0 20px; max-width:75ch;\">Company management understood that the goal couldn't be achieved without knowing who their audience was, what kept viewers watching, and what made creators generate content.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#000000; font-weight:600; margin:0; max-width:75ch;\">I was invited to build a research function that doesn't just execute studies, but becomes an invaluable part of product development.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- STRATEGY -->\n  <div style=\"max-width:900px; margin:0 auto; padding:60px 24px 0px; font-weight:100;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:24px;\">Strategy &amp; approach<\u002Fdiv>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; font-weight:400; margin:0 0 20px; max-width:75ch;\"><span style=\"font-weight:600;\">From the research perspective<\u002Fspan>, I structured my strategy around user types rather than product areas. MAU — the platform's core metric — meant nothing without understanding two very different groups: viewers and creators. They have completely different needs and motivations, but one can't exist without the other. So I built separate research tracks for each from the start.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; font-weight:400; margin:0 0 20px; max-width:75ch;\"><span style=\"font-weight:600;\">From the business perspective<\u002Fspan>, I adapted as the organisation evolved. The product needed both generative research — new ideas for features — and evaluative support for backlog prioritisation. Requests came from product teams, C-level, and senior leadership at the same time. I mapped the demand and used it to justify building a function that could serve the whole company, not just one team.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; font-weight:400; margin:0; max-width:75ch;\"><span style=\"font-weight:600;\">When building the department<\u002Fspan> I staged the growth deliberately: started fully remote to move fast with minimal cost, then added contractors, then grew the in-house team, then expanded the toolkit and the team's scope. The offline lab and eye-tracking came last — they expanded our methodological range, but they also made the function visible and credible to leadership.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- WHAT I BUILT -->\n  <div style=\"max-width:900px; margin:0 auto; padding:60px 24px 0px;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:8px;\">What I built<\u002Fdiv>\n\n    <div style=\"border-top-style:solid; border-top-color:rgba(17,17,17,0.12); border-width:0px; padding:28px 0;\">\n      <h3 style=\"font-size:18px; font-weight:500; letter-spacing:-0.01em; margin:0 0 14px;\">Research infrastructure<\u002Fh3>\n      <p style=\"font-size:15px; line-height:1.7; color:#0e0e0e; font-weight:400; margin:0; max-width:75ch;\">I built the operational foundation first: study templates, artifact standards, and Jira workflows that turned the tracker into a transparent communication channel between the research team and internal clients. To maintain visibility across the organisation, I introduced a regular research digest and recurring department demos. This infrastructure let the team scale without losing consistency.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"border-top-style:solid; border-top-color:rgba(17,17,17,0.12); border-width:0px; padding:0px 0px 28px;\">\n      <h3 style=\"font-size:18px; font-weight:500; letter-spacing:-0.01em; margin:0 0 14px;\">Team &amp; people<\u002Fh3>\n      <img src=\"52d5c83e-dfe7-48fc-8472-d9d85b932c4f\" alt=\"Research lab structure org chart\" class=\"zoomable\" style=\"float: left; width: 233px; height: 294px; margin: 4px 28px 16px 0\">\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0 0 16px; width:705px;\">Product streams were pushing for embedded researchers — one per stream, fully dedicated to their slice of the product. I pushed back: a researcher embedded in a single stream loses the helicopter view, which is crucial for RUTUBE's user experience as it had to be smooth and seamless across platforms and features. At the same time, I understood the need for a \"user voice\" presence in each stream.<\u002Fp>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0 0 16px; width:705px;\">The solution I brought from CIS telecom and banking was the CJE model — Customer Journey Experts. Instead of fragmenting the research team, I created a separate sub-department of 5 CJEs who sit within product streams, own and maintain the CJMs, and act as mediators between product and user experience. They validate product initiatives against the map and route hypotheses that need deeper investigation to the UXR team.<\u002Fp>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0; width:705px;\">For the team's growth, I developed a competency map and career framework, held regular 1:1s, and made space for initiatives that came from the researchers themselves.<\u002Fp>\n      <div style=\"clear:both;\"><\u002Fdiv>\n\n      <!-- FIG: competency map -->\n      <figure style=\"margin:48px 0 0;\">\n        \n        \n      <\u002Ffigure>\n    <\u002Fdiv>\n\n    <div style=\"border-top-style:solid; border-top-color:rgba(17,17,17,0.12); border-width:0px; padding:0px 0px 28px;\">\n      <h3 style=\"font-size:18px; font-weight:500; letter-spacing:-0.01em; margin:0 0 14px;\">Methodological expansion<\u002Fh3>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0 0 16px; max-width:75ch;\">I staged the toolkit expansion alongside the team's growth. We started fully remote, then added contractors for recruitment and tools for surveys, then expanded toward an offline research lab with a dedicated observation room and a video feed between rooms. The last addition was eye-tracking equipment.<\u002Fp>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0 0 16px; max-width:75ch;\">One area I'm particularly proud of is children's research. We ran a large-scale study of Rutube Kids — almost a year of interviews and surveys — focused not just on children's behaviour but on the parent-child dynamic and how parental influence shaped viewing habits. This research was foundational for the Rutube Kids platform.<\u002Fp>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0; max-width:75ch;\">I also initiated accessibility research: qualitative studies with visually and hearing-impaired users that produced an accessibility guide and fed directly into ongoing product initiatives. By the time I left, RUTUBE had hired a dedicated accessibility specialist — a role that didn't exist before and that came directly from our advocacy.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"border-top-style:solid; border-top-color:rgba(17,17,17,0.12); border-bottom-style:solid; border-bottom-color:rgba(17,17,17,0.12); border-width:0px; padding:0px 0px 28px;\">\n      <h3 style=\"font-size:18px; font-weight:500; letter-spacing:-0.01em; margin:0 0 14px;\">Cross-functional expansion<\u002Fh3>\n      <p style=\"font-size:15px; line-height:1.7; color:#000000; margin:0; max-width:75ch;\">Research scope at Rutube eventually extended beyond product. I brought UXR into the content department — an area that had never worked with researchers before. After an initial period of skepticism from the general producer, the team began testing pilot TV episodes, evaluating logos and naming, and running creative checks. This opened a new channel for research impact that wasn't on anyone's roadmap when I joined.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RESULT -->\n  <div style=\"max-width:900px; margin:0 auto; padding:60px 24px 0px;\">\n    <div style=\"font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#56624A; margin-bottom:24px;\">Result<\u002Fdiv>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; margin:0 0 20px; max-width:75ch;\">Within the first year, the team conducted 200+ research studies across product, content, and accessibility tracks — covering viewers, content creators, children aged 3–12, moderation staff, and users with hearing and visual impairments.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; margin:0 0 20px; max-width:75ch;\">Research moved from a support function to a decision-making input: user impact became an explicit criterion in backlog prioritization, and specific product features — onboarding, video upload flow, \"Mine\" section, registration and authorisation redesign, light theme — shipped with research directly informing the direction.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#111111; margin:0 0 20px; max-width:75ch;\">Two initiatives stand out as examples of research driving structural change. The children's platform \"RUTUBE Kids\" launched with a strong start: 60,000 downloads and 150+ positive reviews within 3 months. The accessibility programme led to the creation of a dedicated accessibility specialist role — a function that didn't exist before and that continues the work beyond my time at the company.<\u002Fp>\n    <p style=\"font-size:15px; line-height:1.7; color:#000000; font-weight:600; margin:0; max-width:75ch;\">Rutube's platform grew significantly during this period: MAU reached 46M (10× growth), average watch time increased by 45%, and app store ratings reached 4.0. Research was one of the contributing factors — embedded in product decisions throughout this growth.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"max-width:900px; margin:0 auto; padding:96px 24px 96px;\">\n    <a href=\"Dasha Orlova.html#projects\" style=\"font-size:15px; color:#56624A; text-decoration:none; border-bottom:1px solid rgba(86,98,74,0.35);\" style-hover=\"border-color:#56624A;\">← Back to all projects<\u002Fa>\n    <div style=\"margin-top:64px; padding-top:24px; border-top:1px solid rgba(17,17,17,0.08); display:flex; align-items:center; justify-content:space-between; font-family:'Spline Sans Mono',monospace; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:#888888;\">\n      <span>© 2026 Dasha Orlova<\u002Fspan>\n      <span>Case · RUTUBE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
